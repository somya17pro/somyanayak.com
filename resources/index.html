  <main class="desktop" id="desktop">
    <div class="cloud cloud-one" aria-hidden="true"></div>
    <div class="cloud cloud-two" aria-hidden="true"></div>
    <div class="cloud cloud-three" aria-hidden="true"></div>
    <div class="bird bird-1" aria-hidden="true"></div>
    <div class="bird bird-2" aria-hidden="true"></div>
    <div class="bird bird-3" aria-hidden="true"></div>
    <div class="bird bird-4" aria-hidden="true"></div>
    <div class="bird bird-5" aria-hidden="true"></div>
    <div class="bird bird-6" aria-hidden="true"></div>

    <section class="desktop-icons" aria-label="Project icons">
      <a class="desktop-icon" href="/">
        <span class="pixel-icon icon-dashboard" aria-hidden="true"></span>
        <span>Home</span>
      </a>
      <a class="desktop-icon" href="/about">
        <span class="pixel-icon icon-profile" aria-hidden="true"></span>
        <span>About Me</span>
      </a>
      <a class="desktop-icon" href="/work">
        <span class="pixel-icon icon-megaphone" aria-hidden="true"></span>
        <span>Works</span>
      </a>
      <a class="desktop-icon" href="/resources">
        <span class="pixel-icon icon-seo" aria-hidden="true"></span>
        <span>Resources</span>
      </a>
      <a class="desktop-icon" href="/newsletter">
        <span class="pixel-icon icon-contact" aria-hidden="true"></span>
        <span>Newsletter</span>
      </a>
      <a class="desktop-icon" href="/contact">
        <span class="pixel-icon icon-socials" aria-hidden="true"></span>
        <span>Contact</span>
      </a>
    </section>

    <section class="windows" id="windows" aria-live="polite">

      <article class="window chat-window" id="chat" style="left: 54vw; top: 14vh;" aria-label="Chat with Mini Somya">
        <div class="window-titlebar">
          <div class="traffic"><button data-close></button><button></button><button></button></div>
          <span>Chat with Mini Somya</span>
        </div>
        <div class="window-body chat-body">
          <div class="chat-log" id="chatLog" aria-live="polite">
            <div class="chat-message bot">
              <span class="mini-avatar" aria-hidden="true"></span>
              <p>Hey, I'm Mini Somya. Ask me anything about Somya.</p>
            </div>
          </div>
          <form class="chat-form" id="chatForm">
            <label class="sr-only" for="chatInput">Ask Mini Somya a question</label>
            <input id="chatInput" name="question" type="text" autocomplete="off" placeholder="Ask about experience, skills, contact..." required>
            <button type="submit">Ask</button>
          </form>
          <div class="quick-asks" aria-label="Suggested questions">
            <button type="button" data-question="Can you summarize your marketing experience?">Experience</button>
            <button type="button" data-question="What did you do at Intempt?">Intempt</button>
            <button type="button" data-question="How did you scale Marvedge to $1k MRR?">Marvedge</button>
            <button type="button" data-question="What were your biggest achievements at Interactly?">Interactly</button>
            <button type="button" data-question="Do you have experience with B2B outbound?">Outbound</button>
            <button type="button" data-question="What are your core marketing skills?">Skills</button>
            <button type="button" data-question="How can I contact Somya?">Contact</button>
          </div>
        </div>
      </article>

      
      <article class="window open" id="resources" style="left: 30vw; top: 25vh; min-width: 400px; text-align: center;" aria-label="Resources">
        <div class="window-titlebar">
          <div class="traffic"><a href="/"><button></button></a><button></button><button></button></div>
          <span>Resources</span>
        </div>
        <div class="window-body" style="padding: 40px 20px;">
          <h1>Coming Soon! 🚀</h1>
        </div>
      </article>

    </section>

    <section class="pixel-girl pixel-somya" id="pixelSomya" aria-label="Pixel art character of Somya" role="button" tabindex="0">
      <button id="dismissAvatar" aria-label="Dismiss avatar" class="avatar-dismiss">×</button>
      <div class="speech-bubble" id="speechBubble">Hey, I'm Mini Somya. Click me to chat.</div>
      <div class="hair"></div>
      <div class="face"></div>
      <div class="body"></div>
      <div class="legs"></div>
    </section>
